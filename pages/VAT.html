<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAT</title>
<link rel="stylesheet" href="../style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
    font-family:'Poppins',sans-serif;
    padding:25px;
}

h2{
    font-weight:700;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.valor{
    font-size:34px;
    font-weight:700;
}

.progress{
    height:28px;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    font-weight:600;
    font-size:15px;
}

.btn-warning{
    font-size:18px;
    padding:12px 25px;
    border-radius:12px;
}

</style>

</head>

<body>

<div class="row g-3">

<div class="col-md-4">
<div class="card p-3">
<small>Total BRs</small>
<div id="total" class="valor">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<small>Relocados</small>
<div id="relocados" class="valor text-success">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<small>Consultados</small>
<div id="consultados" class="valor text-primary">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<small>Com Erro</small>
<div id="erro" class="valor text-danger">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<small>Bairro Ofensor</small>
<div id="bairroOfensor" class="valor text-warning">--</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<small>Última atualização</small>
<div id="ultima" class="valor fs-5">--</div>
</div>
</div>

</div>

<div class="card mt-4 p-4">

<h5 class="mb-3">% Relocados</h5>

<div class="progress">
<div
id="barra"
class="progress-bar bg-success"
style="width:0%">
0%
</div>
</div>

</div>

<div class="text-center mt-4">

<a
id="abrirPlanilha"
class="btn btn-warning"
target="_blank">

<i class="bi bi-file-earmark-spreadsheet"></i>
Abrir Planilha Completa

</a>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbx7EoTYZQ4Lq3ENVDdWPHk8Irq7mZN96MqrB-HpOBIc4NUxGmPGmIhqj3IN2SXVYT4/exec?tipo=vat";

const LINK_PLANILHA =
"https://docs.google.com/spreadsheets/d/1stHrx-Dct4gdQXjBqCYLthCe_pbk8SuAboZGx75Le8A/edit?gid=1456285798#gid=1456285798";

document.getElementById("abrirPlanilha").href = LINK_PLANILHA;

async function carregarVAT(){

    try{

        const resposta = await fetch(API);

        if(!resposta.ok){
            throw new Error("Erro ao acessar API");
        }

        const dados = await resposta.json();

        console.log("VAT:",dados);

        document.getElementById("total").textContent =
            Number(dados.total || 0).toLocaleString("pt-BR");

        document.getElementById("relocados").textContent =
            Number(dados.relocados || 0).toLocaleString("pt-BR");

        document.getElementById("consultados").textContent =
            Number(dados.consultados || 0).toLocaleString("pt-BR");

        document.getElementById("erro").textContent =
            Number(dados.erro || 0).toLocaleString("pt-BR");

        document.getElementById("bairroOfensor").textContent =
    dados["bairro ofensor"] || "--";

        if(dados.ultima){

            const data = new Date(dados.ultima);

            if(!isNaN(data.getTime())){

                document.getElementById("ultima").textContent =
                    data.toLocaleString("pt-BR");

            }else{

                document.getElementById("ultima").textContent =
                    dados.ultima;

            }

        }else{

            document.getElementById("ultima").textContent = "--";

        }

        const percentual = Number(dados.percentual || 0);

        const barra = document.getElementById("barra");

        barra.style.width = percentual + "%";
        barra.innerHTML = percentual + "%";

    }catch(e){

        console.error(e);

        document.getElementById("ultima").textContent =
            "Erro na API";

    }

}

carregarVAT();

setInterval(carregarVAT,60000);

</script>

</body>
</html>
